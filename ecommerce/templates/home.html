<!DOCTYPE html>
<html>
<head>
    <title>E-commerce</title>
</head>
<body>

    <h1>Products</h1>

    {% for product in products %}

        <div style="border:1px solid black; padding:10px; margin:10px; width:300px;">

            <img src="{{ product.image.url }}" width="200">

            <h2>{{ product.name }}</h2>

            <h3>₹ {{ product.price }}</h3>

        </div>

    {% endfor %}

</body>
</html>
